<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap");

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0d0f14;
        --bg2: #131620;
        --bg3: #1a1d27;
        --bg4: #20243300;
        --teal: #00d4aa;
        --teal2: #00a884;
        --tealfade: rgba(0, 212, 170, 0.1);
        --amber: #f59e0b;
        --amberfade: rgba(245, 158, 11, 0.1);
        --text: #e8eaf0;
        --muted: #7a7f94;
        --border: rgba(255, 255, 255, 0.07);
        --font-head: "Syne", sans-serif;
        --font-mono: "DM Mono", monospace;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-mono);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* HEADER */
      .hdr {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--bg2);
      }
      .logo-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--teal);
        box-shadow: 0 0 8px var(--teal);
      }
      .hdr-title {
        font-family: var(--font-head);
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--text);
      }
      .hdr-title span {
        color: var(--teal);
      }
      .hdr-badge {
        margin-left: auto;
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 20px;
        border: 1px solid var(--teal2);
        color: var(--teal);
        letter-spacing: 0.08em;
      }

      /* LAYOUT */
      .layout {
        display: flex;
        flex: 1;
        overflow: hidden;
        height: calc(100vh - 49px);
      }

      /* SIDEBAR */
      .sidebar {
        width: 210px;
        min-width: 210px;
        background: var(--bg2);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 12px 0;
        overflow-y: auto;
      }
      .nav-section {
        font-size: 9px;
        letter-spacing: 0.12em;
        color: var(--muted);
        padding: 14px 16px 6px;
        text-transform: uppercase;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 16px;
        cursor: pointer;
        font-size: 11.5px;
        color: var(--muted);
        transition: all 0.15s;
        border-left: 2px solid transparent;
        letter-spacing: 0.02em;
      }
      .nav-item:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.03);
      }
      .nav-item.active {
        color: var(--teal);
        background: var(--tealfade);
        border-left-color: var(--teal);
      }
      .nav-icon {
        font-size: 13px;
        width: 18px;
        text-align: center;
      }
      .nav-num {
        margin-left: auto;
        font-size: 9px;
        color: var(--muted);
        opacity: 0.5;
      }

      /* MAIN */
      .main {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        background: var(--bg);
      }

      /* PAGE HEADER */
      .page-hdr {
        margin-bottom: 22px;
      }
      .page-tag {
        font-size: 9px;
        letter-spacing: 0.14em;
        color: var(--teal);
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .page-title {
        font-family: var(--font-head);
        font-size: 22px;
        font-weight: 800;
        color: var(--text);
        line-height: 1.2;
      }
      .page-sub {
        font-size: 11px;
        color: var(--muted);
        margin-top: 5px;
        line-height: 1.5;
      }

      /* CARD */
      .card {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 18px;
        margin-bottom: 14px;
      }
      .card-title {
        font-family: var(--font-head);
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        letter-spacing: 0.07em;
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      /* FORM ELEMENTS */
      input,
      textarea,
      select {
        width: 100%;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 9px 12px;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
        resize: vertical;
      }
      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--teal2);
      }
      label {
        font-size: 11px;
        color: var(--muted);
        display: block;
        margin-bottom: 5px;
        letter-spacing: 0.03em;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 12px;
      }
      .form-group {
        margin-bottom: 12px;
      }
      select option {
        background: #1a1d27;
      }

      /* BUTTON */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 18px;
        border-radius: 7px;
        border: none;
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 500;
        transition: all 0.15s;
        letter-spacing: 0.03em;
      }
      .btn-primary {
        background: var(--teal);
        color: #0d0f14;
      }
      .btn-primary:hover {
        background: var(--teal2);
      }
      .btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn-ghost {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.2);
      }
      .btn-amber {
        background: var(--amberfade);
        color: var(--amber);
        border: 1px solid rgba(245, 158, 11, 0.2);
      }

      /* OUTPUT BOX */
      .output-box {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        font-size: 12px;
        line-height: 1.8;
        color: var(--text);
        min-height: 120px;
        white-space: pre-wrap;
        word-break: break-word;
        border-left: 3px solid var(--teal);
      }
      .output-box.loading {
        color: var(--muted);
        font-style: italic;
      }
      .output-box .section-head {
        color: var(--teal);
        font-weight: 500;
        display: block;
        margin-top: 10px;
        margin-bottom: 2px;
      }

      /* TAGS */
      .tag {
        display: inline-block;
        padding: 3px 9px;
        border-radius: 20px;
        font-size: 10px;
        letter-spacing: 0.05em;
        margin: 3px 3px 3px 0;
      }
      .tag-teal {
        background: var(--tealfade);
        color: var(--teal);
        border: 1px solid rgba(0, 212, 170, 0.2);
      }
      .tag-amber {
        background: var(--amberfade);
        color: var(--amber);
        border: 1px solid rgba(245, 158, 11, 0.2);
      }
      .tag-muted {
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        border: 1px solid var(--border);
      }

      /* AD CARDS */
      .ad-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .ad-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 14px;
        position: relative;
        overflow: hidden;
      }
      .ad-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
      }
      .ad-card.type-search::before {
        background: var(--teal);
      }
      .ad-card.type-social::before {
        background: var(--amber);
      }
      .ad-card.type-display::before {
        background: #818cf8;
      }
      .ad-card.type-video::before {
        background: #f472b6;
      }
      .ad-type-badge {
        font-size: 9px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .ad-headline {
        font-family: var(--font-head);
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 5px;
        line-height: 1.3;
      }
      .ad-body {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.5;
        margin-bottom: 8px;
      }
      .ad-cta {
        font-size: 10px;
        color: var(--teal);
        letter-spacing: 0.05em;
        cursor: pointer;
      }
      .ad-meta {
        display: flex;
        gap: 8px;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--border);
      }
      .ad-stat {
        font-size: 10px;
        color: var(--muted);
      }
      .ad-stat span {
        color: var(--text);
      }

      /* ANALYTICS */
      .metric-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 14px;
      }
      .metric-card {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        text-align: center;
      }
      .metric-val {
        font-family: var(--font-head);
        font-size: 22px;
        font-weight: 800;
        color: var(--teal);
      }
      .metric-label {
        font-size: 10px;
        color: var(--muted);
        margin-top: 3px;
        letter-spacing: 0.05em;
      }
      .metric-delta {
        font-size: 10px;
        margin-top: 4px;
      }
      .delta-up {
        color: #34d399;
      }
      .delta-down {
        color: #f87171;
      }

      /* PROGRESS BAR */
      .prog-bar {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 4px;
        height: 4px;
        margin-top: 6px;
      }
      .prog-fill {
        height: 4px;
        border-radius: 4px;
        background: var(--teal);
        transition: width 0.6s ease;
      }

      /* SEARCH MODES */
      .search-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 14px;
      }
      .stab {
        padding: 7px 14px;
        border-radius: 20px;
        font-size: 11px;
        cursor: pointer;
        border: 1px solid var(--border);
        color: var(--muted);
        transition: all 0.15s;
        font-family: var(--font-mono);
      }
      .stab.active {
        background: var(--teal);
        color: #0d0f14;
        border-color: var(--teal);
      }

      /* VOICE */
      .voice-ring {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        margin: 0 auto 14px;
        transition: all 0.2s;
        font-size: 24px;
      }
      .voice-ring:hover,
      .voice-ring.recording {
        border-color: var(--teal);
        background: var(--tealfade);
      }
      .voice-ring.recording {
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(0, 212, 170, 0.4);
        }
        50% {
          box-shadow: 0 0 0 12px rgba(0, 212, 170, 0);
        }
      }

      /* IMAGE DROP */
      .img-drop {
        border: 2px dashed var(--border);
        border-radius: 10px;
        padding: 30px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 12px;
        color: var(--muted);
      }
      .img-drop:hover {
        border-color: var(--teal2);
        background: var(--tealfade);
      }
      .img-drop.has-image {
        border-color: var(--teal);
        border-style: solid;
      }
      .img-drop img {
        max-height: 150px;
        max-width: 100%;
        border-radius: 6px;
        display: block;
        margin: 0 auto 10px;
      }

      /* DIVIDER */
      hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 14px 0;
      }

      /* SCROLLBAR */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
      }

      /* SPINNER */
      .spin {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid rgba(0, 212, 170, 0.3);
        border-top-color: var(--teal);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* TOOLTIP WRAP */
      .info-chip {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 10px;
        letter-spacing: 0.05em;
        border: 1px solid;
        background: transparent;
      }
      .chip-teal {
        color: var(--teal);
        border-color: rgba(0, 212, 170, 0.25);
      }
      .chip-amber {
        color: var(--amber);
        border-color: rgba(245, 158, 11, 0.25);
      }

      /* HOME GRID */
      .home-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      .home-tile {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .home-tile:hover {
        border-color: var(--teal2);
        background: rgba(0, 212, 170, 0.04);
        transform: translateY(-1px);
      }
      .home-tile-icon {
        font-size: 20px;
        margin-bottom: 8px;
      }
      .home-tile-name {
        font-family: var(--font-head);
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 4px;
      }
      .home-tile-desc {
        font-size: 10px;
        color: var(--muted);
        line-height: 1.5;
      }
      .home-tile-num {
        font-size: 9px;
        color: var(--teal);
        letter-spacing: 0.1em;
        margin-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <div class="hdr">
      <div class="logo-dot"></div>
      <div class="hdr-title">AI <span>Marketing</span> Assistant</div>
    </div>

    <div class="layout">
      <div class="sidebar">
        <div class="nav-section">Modules</div>
        <div class="nav-item active" onclick="nav(0)">
          <span class="nav-icon">⊞</span>Dashboard<span class="nav-num"
            >HOME</span
          >
        </div>
        <div class="nav-item" onclick="nav(1)">
          <span class="nav-icon">✦</span>Content Generator<span class="nav-num"
            >01</span
          >
        </div>
        <div class="nav-item" onclick="nav(2)">
          <span class="nav-icon">✉</span>Email Marketing<span class="nav-num"
            >02</span
          >
        </div>
        <div class="nav-item" onclick="nav(3)">
          <span class="nav-icon">◈</span>Recommendations<span class="nav-num"
            >03</span
          >
        </div>
        <div class="nav-item" onclick="nav(4)">
          <span class="nav-icon">◉</span>Targeted Ads<span class="nav-num"
            >04</span
          >
        </div>
        <div class="nav-item" onclick="nav(5)">
          <span class="nav-icon">▲</span>Analytics<span class="nav-num"
            >05</span
          >
        </div>
        <div class="nav-item" onclick="nav(6)">
          <span class="nav-icon">◧</span>PR Presentation<span class="nav-num"
            >06</span
          >
        </div>
        <div class="nav-item" onclick="nav(7)">
          <span class="nav-icon">⌖</span>AI Product Search<span class="nav-num"
            >07</span
          >
        </div>
        <div style="margin-top: auto; padding: 14px 16px">
          <div style="font-size: 10px; color: var(--muted); line-height: 1.6">
            AI Digital Marketing<br />Automation Tool<br />
            <span style="color: var(--teal)">v1.0.0</span>
          </div>
        </div>
      </div>

      <div class="main" id="main-area"></div>
    </div>

    <script>
      const API = "https://api.anthropic.com/v1/messages";
      let activeModule = 0;

      async function callClaude(prompt, systemMsg) {
        const sys =
          systemMsg ||
          "You are an expert AI digital marketing assistant. Be concise, practical, and professional. Format responses clearly with sections when appropriate.";
        const resp = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            system: sys,
            messages: [{ role: "user", content: prompt }],
          }),
        });
        const data = await resp.json();
        if (data.error) throw new Error(data.error.message);
        return data.content[0].text;
      }

      async function streamToBox(boxId, prompt, systemMsg) {
        const box = document.getElementById(boxId);
        box.textContent = "";
        box.className = "output-box loading";
        box.innerHTML = '<span class="spin"></span>  Generating with AI...';
        try {
          const text = await callClaude(prompt, systemMsg);
          box.className = "output-box";
          box.textContent = text;
        } catch (e) {
          box.className = "output-box";
          box.textContent = "Error: " + e.message;
        }
      }

      function nav(n) {
        activeModule = n;
        document
          .querySelectorAll(".nav-item")
          .forEach((el, i) => el.classList.toggle("active", i === n));
        render(n);
      }

      function render(n) {
        const m = document.getElementById("main-area");
        const pages = [
          renderHome,
          renderContent,
          renderEmail,
          renderRec,
          renderAds,
          renderAnalytics,
          renderPR,
          renderSearch,
        ];
        m.innerHTML = "";
        pages[n] && pages[n](m);
      }

      // --- HOME ---
      function renderHome(m) {
        m.innerHTML = `
  <div class="page-hdr">
    <div class="page-tag">Dashboard</div>
    <div class="page-title">AI Marketing Command Center</div>
    <div class="page-sub">Select a module below to start automating your digital marketing with AI.</div>
  </div>
  <div class="home-grid">
    ${[
      [
        "01",
        "✦",
        "Content Generator",
        "Generate website copy, blog titles & SEO keywords instantly.",
      ],
      [
        "02",
        "✉",
        "Email Marketing",
        "AI-crafted personalized marketing emails for any campaign.",
      ],
      [
        "03",
        "◈",
        "Recommendation Engine",
        "Smart service recommendations based on customer interests.",
      ],
      [
        "04",
        "◉",
        "Targeted Ads",
        "Programmatic ad copy for search, social & display channels.",
      ],
      [
        "05",
        "▲",
        "Analytics Dashboard",
        "Traffic predictions & performance metrics visualized.",
      ],
      [
        "06",
        "◧",
        "PR Presentation",
        "Auto-generate marketing presentations & pitch decks.",
      ],
      [
        "07",
        "⌖",
        "AI Product Search",
        "Search products by text, voice command or image upload.",
      ],
    ]
      .map(
        ([num, icon, name, desc], i) => `
      <div class="home-tile" onclick="nav(${i + 1})">
        <div class="home-tile-num">MODULE ${num}</div>
        <div class="home-tile-icon">${icon}</div>
        <div class="home-tile-name">${name}</div>
        <div class="home-tile-desc">${desc}</div>
      </div>
    `,
      )
      .join("")}
    <div class="home-tile" style="border-style:dashed;cursor:default;opacity:.5">
      <div class="home-tile-icon" style="font-size:16px">+</div>
      <div class="home-tile-name" style="font-size:12px">More coming soon</div>
      <div class="home-tile-desc">Additional AI modules in development.</div>
    </div>
  </div>`;
      }

      // --- 01 CONTENT GENERATOR ---
      function renderContent(m) {
        m.innerHTML = `
  <div class="page-hdr">
    <div class="page-tag">Module 01</div>
    <div class="page-title">Content Generator</div>
    <div class="page-sub">Generate website content, blog titles, and SEO keywords.</div>
  </div>
  <div class="card">
    <div class="card-title">Business Details</div>
    <div class="form-row">
      <div class="form-group"><label>Business Name</label><input id="c-biz" placeholder="e.g. TechBoost Agency" /></div>
      <div class="form-group"><label>Industry</label><input id="c-ind" placeholder="e.g. Digital Marketing" /></div>
    </div>
    <div class="form-group"><label>Services (comma-separated)</label><input id="c-svc" placeholder="e.g. SEO, PPC Ads, Social Media, Content Marketing" /></div>
    <div class="form-group"><label>Target Audience</label><input id="c-aud" placeholder="e.g. Small businesses, Startups, E-commerce brands" /></div>
    <div class="form-group"><label>Content Type</label>
      <select id="c-type">
        <option value="website">Website Homepage Content</option>
        <option value="blog">Blog Post Titles (10 ideas)</option>
        <option value="seo">SEO Keywords & Meta Description</option>
        <option value="all">Full Package (All of the above)</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="genContent()"><span class="spin" id="c-spin" style="display:none"></span>✦ Generate Content</button>
  </div>
  <div class="card">
    <div class="card-title">Generated Output</div>
    <div class="output-box" id="c-out" style="color:var(--muted);font-style:italic">Fill in details above and click Generate.</div>
  </div>`;
      }
      async function genContent() {
        const biz = V("c-biz"),
          ind = V("c-ind"),
          svc = V("c-svc"),
          aud = V("c-aud"),
          type = V("c-type");
        if (!biz) {
          alert("Please enter a business name.");
          return;
        }
        const types = {
          website:
            "professional homepage content with hero heading, tagline, about section, services overview, and CTA",

      // --- 07 AI PRODUCT SEARCH ---
      let searchMode = "text";
      let mediaRecorder,
        audioChunks = [],
        isRecording = false;
      let uploadedImg = null;

      function renderSearch(m) {
        m.innerHTML = `
  <div class="page-hdr">
    <div class="page-tag">Module 07</div>
    <div class="page-title">AI Product Search</div>
    <div class="page-sub">Search products and services using text, voice, or image upload.</div>
  </div>
  <div class="card">
    <div class="card-title">Search Mode</div>
    <div class="search-tabs">
      <div class="stab active" id="stab-text" onclick="setMode('text')">⌨ Text</div>
      <div class="stab" id="stab-voice" onclick="setMode('voice')">🎙 Voice</div>
      <div class="stab" id="stab-image" onclick="setMode('image')">🖼 Image</div>
    </div>
    <div id="search-input-area"></div>
    <div class="form-group" style="margin-top:12px">
      <label>Product Catalog / Services (what you offer)</label>

    </div>
    <button class="btn btn-primary" id="s-btn" onclick="doSearch()">⌖ Search with AI</button>
  </div>
  <div class="card">
    <div class="card-title">Search Results</div>
    <div class="output-box" id="s-out" style="color:var(--muted);font-style:italic">Enter a search query above.</div>
  </div>`;
        setMode("text");
      }

      function setMode(mode) {
        searchMode = mode;
        ["text", "voice", "image"].forEach((m) => {
          document
            .getElementById("stab-" + m)
            .classList.toggle("active", m === mode);
        });
        const area = document.getElementById("search-input-area");
        if (mode === "text") {
          area.innerHTML = `<div class="form-group"><label>What are you looking for?</label><input id="s-query" placeholder="e.g. I need help improving my Google rankings and getting more organic traffic" /></div>`;
        } else if (mode === "voice") {
          area.innerHTML = `
    <div style="text-align:center;padding:10px 0">
      <div class="voice-ring" id="voice-ring" onclick="toggleRecord()">🎙</div>
      <div style="font-size:11px;color:var(--muted)" id="voice-status">Click the mic to start recording</div>
      <div style="font-size:11px;color:var(--teal);margin-top:6px" id="voice-transcript"></div>
    </div>
    <div class="form-group"><label>Or type voice transcript here</label><input id="s-query" placeholder="Speak or type your search query..." /></div>`;
        } else {
          area.innerHTML = `
    <div class="img-drop" id="img-drop" onclick="document.getElementById('img-file').click()">
      <div id="img-preview-area">
        <div style="font-size:24px;margin-bottom:8px">🖼</div>
        <div>Click to upload product image or screenshot</div>
        <div style="font-size:10px;margin-top:4px;opacity:.6">PNG, JPG, GIF supported</div>
      </div>
    </div>
    <input type="file" id="img-file" accept="image/*" style="display:none" onchange="handleImg(event)"/>
    <div class="form-group" style="margin-top:10px"><label>Additional context (optional)</label><input id="s-query" placeholder="Describe what you're looking for..." /></div>`;
        }
      }

      async function toggleRecord() {
        if (!isRecording) {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              audio: true,
            });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
              document.getElementById("voice-status").textContent =
                "Recording saved. Click Search!";
              document.getElementById("s-query").placeholder =
                "Voice recorded — click Search with AI";
              stream.getTracks().forEach((t) => t.stop());
            };
            mediaRecorder.start();
            isRecording = true;
            document.getElementById("voice-ring").classList.add("recording");
            document.getElementById("voice-status").textContent =
              "Recording... Click again to stop";
          } catch (e) {
            document.getElementById("voice-status").textContent =
              "Mic access denied. Use text fallback below.";
          }
        } else {
          mediaRecorder.stop();
          isRecording = false;
          document.getElementById("voice-ring").classList.remove("recording");
        }
      }

      function handleImg(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          uploadedImg = ev.target.result;
          const drop = document.getElementById("img-drop");
          drop.className = "img-drop has-image";
          document.getElementById("img-preview-area").innerHTML =
            `<img src="${uploadedImg}" /><div style="font-size:11px;color:var(--teal)">${file.name} — ready for analysis</div>`;
        };
        reader.readAsDataURL(file);
      }

      async function doSearch() {
        const query = V("s-query") || "";
        const catalog =
          V("s-catalog") ||
          "SEO, PPC, Social Media Marketing, Content Creation, Email Marketing, Web Design";

        if (searchMode === "image" && uploadedImg) {
          const box = document.getElementById("s-out");
          box.innerHTML =
            '<span class="spin"></span>  Analyzing image with AI...';
          box.className = "output-box loading";
          try {
            const base64 = uploadedImg.split(",")[1];
            const mime = uploadedImg.split(";")[0].split(":")[1];
            const resp = await fetch(API, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 1000,
                messages: [
                  {
                    role: "user",
                    content: [
                      {
                        type: "image",
                        source: {
                          type: "base64",
                          media_type: mime,
                          data: base64,
                        },
                      },
                      {
                        type: "text",
                        text: `Based on this image, identify what product/service the user might be looking for and recommend the best matches from this catalog: ${catalog}. Also provide: 1) What you see in the image, 2) Top 3 service recommendations with reasoning, 3) Suggested next steps.${query ? " Additional context: " + query : ""}`,
                      },
                    ],
                  },
                ],
              }),
            });
            const data = await resp.json();
            box.className = "output-box";
            box.textContent = data.content[0].text;
          } catch (e) {
            document.getElementById("s-out").textContent =
              "Error: " + e.message;
          }
          return;
        }

        const q =
          query || (searchMode === "voice" ? "general marketing services" : "");
        if (!q) {
          alert("Please enter a search query.");
          return;
        }
        await streamToBox(
          "s-out",
          `A customer is searching for: "${q}"

Available services/products in catalog: ${catalog}

Provide:
1. SEARCH RESULTS — Top 3-5 best matching services with relevance score (out of 10)
2. WHY EACH MATCHES — brief explanation per result
3. BEST RECOMMENDATION — your top pick with full details
4. RELATED SUGGESTIONS — 2 additional services they might also need
5. NEXT STEPS — what action should they take

Format clearly with headers and be specific.`,
          "You are an intelligent product search engine for a digital marketing agency. Match customer queries to services intelligently.",
        );
      }

      function V(id) {
        return (document.getElementById(id) || {}).value || "";
      }

      render(0);
    </script>
  </body>
